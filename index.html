<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qualifin E-Course — WMI Certification</title>
  <link rel="icon" href="assets/logo.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <img src="assets/logo.svg" alt="Qualifin" />
      <nav>
        <button class="tab-btn active" data-target="panel-lessons">Video Pembelajaran</button>
        <button class="tab-btn" data-target="panel-materials">Materi (PDF)</button>
        <button class="tab-btn" data-target="panel-quiz">Try Out</button>
      </nav>
    </div>
  </header>

  <div class="hero">
    <h1 id="course-title"></h1>
    <p class="subtitle" id="course-subtitle"></p>
    <p class="description" id="course-description"></p>
  </div>

  <main>
    <section id="panel-lessons" class="panel active">
      <div class="lessons-layout">
        <div class="lesson-list" id="lesson-list"></div>
        <div class="lesson-viewer" id="lesson-viewer"></div>
      </div>
    </section>

    <section id="panel-materials" class="panel">
      <div id="materials-list"></div>
    </section>

    <section id="panel-quiz" class="panel">
      <div id="quiz-result" class="quiz-result" style="display:none"></div>
      <form id="quiz-form"></form>
      <div class="quiz-actions">
        <button type="button" id="submit-quiz">Submit Try Out</button>
      </div>
    </section>
  </main>

  <footer>Qualifin E-Course &mdash; WMI Certification Prep</footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
